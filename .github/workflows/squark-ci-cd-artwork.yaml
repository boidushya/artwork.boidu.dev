name: Squark CI/CD artwork

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: 485141928625.dkr.ecr.ap-south-1.amazonaws.com
  IMAGE_NAME: 485141928625.dkr.ecr.ap-south-1.amazonaws.com/squark-b95507f8/artwork

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_B95507F8 }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_B95507F8 }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          REPO_NAME="${{ env.IMAGE_NAME }}"
          REPO_NAME="${REPO_NAME#*/}"
          aws ecr describe-repositories --repository-names "$REPO_NAME" --region ap-south-1 2>/dev/null ||             aws ecr create-repository --repository-name "$REPO_NAME" --region ap-south-1 --image-scanning-configuration scanOnPush=true

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}
            ${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Squark Deployment
        run: |
          curl -X POST "https://api.squark.cloud/api/webhooks/deploy" \
            -H "Content-Type: application/json" \
            -H "X-Squark-Signature: ${{ secrets.SQUARK_WEBHOOK_SECRET_ARTWORK_6BEE84AC }}" \
            -d @- <<EOF
          {
            "application_id": "6bee84ac-a135-4a44-a0ce-11baebf47b9c",
            "cluster_id": "04397f60-fc66-46ee-b76a-6860a5e7f072",
            "image": "${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}",
            "commit_sha": "${{ github.sha }}",
            "commit_message": "${{ github.event.head_commit.message }}",
            "branch": "${{ github.ref_name }}",
            "triggered_by": "${{ github.actor }}"
          }
          EOF
